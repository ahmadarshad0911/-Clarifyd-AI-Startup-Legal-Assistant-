name: Phase 1 CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          # Dummy build-time values so the production build compiles
          # deterministically in CI (real values are set in the deploy env).
          NEXT_PUBLIC_API_URL: "https://example.invalid"
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2ktYnVpbGQuY2xlcmsuYWNjb3VudHMuZGV2JA"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan working tree for secrets (gitleaks)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          # --no-git: scan files on disk (the committed state), not full history,
          # so a green run means no live secret is present in current files.
          ./gitleaks detect --no-git --source . --redact --exit-code 1

